<div class="dashboard-container p-4 card">
    <div class="category-wrapper" *ngFor="let function of getDashboardCategories()">
        <div class="category-label">
            <span class="text-s font-bold uppercase tracking-wider text-700">{{ function.name }}</span>
            <div class="label-line"></div>
        </div>

        <div class="flex flex-wrap gap-4 mt-3 mb-6">
            <div *ngFor="let module of function.modules" [id]="'module-card-' + module.code" class="module-glass-card"
                [class.is-locked]="!module.isImplemented && module.code !== 'LGOT'"
                [class.module-highlighted]="isModuleHighlighted(module.code)" (click)="onModuleClick(module)">

                <div class="card-glow"></div>

                <div class="icon-section">
                    <ng-container *ngIf="isModuleLogoLoading(module); else moduleIconReady">
                        <p-skeleton width="2.8rem" height="2.8rem" borderRadius="8px"
                            styleClass="module-logo-skeleton"></p-skeleton>
                    </ng-container>
                    <ng-template #moduleIconReady>
                        <img *ngIf="module.icon" [src]="module.icon" [alt]="module.name" class="img-icon">
                        <span *ngIf="!module.icon" class="emoji-icon">{{ getModuleIcon(module) }}</span>
                    </ng-template>
                </div>

                <div class="name-section">
                    <span class="module-text">{{ module.name }}</span>
                    <!-- <span class="status-indicator" *ngIf="module.isImplemented || module.code === 'LGOT'">
                        {{ module.code }}
                    </span> -->
                </div>

                <div class="active-bar"></div>
            </div>
        </div>
    </div>
</div>
