<div class="auth-brand" [class.auth-brand--rtl]="isRtl">
    <img class="auth-brand__logo" src="assets/media/logo/PMAT_Logo_(Small)_No_Bkgnd.png"
        [attr.alt]="'auth.login.logoAlt' | translate" width="200" height="200" />
    <div class="auth-brand__text">
        <span class="auth-brand__name">{{ 'auth.login.brandName' | translate }}</span>
        <span class="auth-brand__tagline">{{ 'auth.login.brandTagline' | translate }}</span>
    </div>
</div>
