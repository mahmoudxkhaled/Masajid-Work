<p-toast />

<div class="block-section card">
  <div class="flex flex-wrap align-items-center justify-content-between gap-3 mb-3">
    <div class="flex flex-column gap-2 flex-1 min-w-0">
      <h2 class="block-title mb-0">{{ 'donations.vendorOffers.form.editTitle' | translate }}</h2>
      <p class="mb-0 text-500">{{ 'donations.vendorOffers.form.editSubtitle' | translate }}</p>
    </div>
    <div class="flex flex-wrap gap-2">
      <p-button [label]="'common.cancel' | translate" icon="pi pi-times" severity="secondary" [outlined]="true"
        (onClick)="backToDetails()" [disabled]="saving"></p-button>
      <p-button [label]="'donations.vendorOffers.actions.saveOffer' | translate" icon="pi pi-check" severity="success"
        (onClick)="submitUpdate()" [disabled]="loading || saving || !!(isLoading$ | async)"></p-button>
    </div>
  </div>

  <ng-container *ngIf="loading; else formContent">
    <div class="block-card p-3">
      <div class="flex flex-column gap-3">
        <p-skeleton height="2.5rem" width="100%"></p-skeleton>
        <p-skeleton height="2.5rem" width="100%"></p-skeleton>
        <p-skeleton height="2.5rem" width="50%"></p-skeleton>
        <p-skeleton height="6rem" width="100%"></p-skeleton>
        <p-skeleton height="2.5rem" width="100%"></p-skeleton>
      </div>
    </div>
  </ng-container>

  <ng-template #formContent>
    <div class="block-card p-3">
      <div class="flex flex-column gap-3">
        <div class="flex flex-column gap-2">
          <label class="font-medium">{{ 'donations.vendorOffers.form.offerAmount' | translate }}</label>
          <p-inputNumber [(ngModel)]="offerAmount" [min]="0" mode="decimal" [minFractionDigits]="0"
            [maxFractionDigits]="2" styleClass="w-full"></p-inputNumber>
        </div>

        <div class="flex flex-column gap-2">
          <label class="font-medium">{{ 'donations.vendorOffers.form.currencyCode' | translate }}</label>
          <p-dropdown [options]="currencyOptions" [(ngModel)]="currencyCode" optionLabel="label" optionValue="value"
            [placeholder]="'donations.vendorOffers.form.currencyPlaceholder' | translate"
            styleClass="w-full"></p-dropdown>
        </div>

        <div class="flex flex-wrap gap-3">
          <div class="flex align-items-center gap-2">
            <p-checkbox [(ngModel)]="includesSupply" [binary]="true" inputId="editIncludesSupply"></p-checkbox>
            <label for="editIncludesSupply">{{ 'donations.vendorOffers.form.includesSupply' | translate }}</label>
          </div>
          <div class="flex align-items-center gap-2">
            <p-checkbox [(ngModel)]="includesInstallation" [binary]="true"
              inputId="editIncludesInstallation"></p-checkbox>
            <label for="editIncludesInstallation">{{ 'donations.vendorOffers.form.includesInstallation' | translate
              }}</label>
          </div>
        </div>

        <div class="flex flex-column gap-2">
          <label class="font-medium">{{ 'donations.vendorOffers.form.description' | translate }}</label>
          <textarea pInputTextarea rows="4" class="w-full" [(ngModel)]="description"></textarea>
        </div>

        <div class="flex flex-column gap-2">
          <label class="font-medium">{{ 'donations.vendorOffers.form.validUntil' | translate }}</label>
          <p-calendar [(ngModel)]="validUntilDate" [minDate]="minValidUntilDate" dateFormat="yy-mm-dd" [showIcon]="true"
            appendTo="body" styleClass="w-full"></p-calendar>
        </div>
      </div>
    </div>
  </ng-template>
</div>
