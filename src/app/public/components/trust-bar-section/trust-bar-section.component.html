<section id="trust-bar" class="trust-bar" [publicScrollReveal]="'down'">
  <div class="trust-bar__inner">
    <div class="trust-bar__item" *ngFor="let item of items">
      <span class="material-symbols-outlined trust-bar__icon" aria-hidden="true">{{ item.icon }}</span>
      <span class="trust-bar__label">{{ item.labelKey | translate }}</span>
    </div>
  </div>
</section>
