# Masajid Work — Angular SPA (Nginx site config)
#
# Install on Ubuntu:
#   sudo cp deploy/nginx/masajid-work.conf /etc/nginx/sites-available/masajid-work
#   sudo ln -sf /etc/nginx/sites-available/masajid-work /etc/nginx/sites-enabled/masajid-work
#   sudo nginx -t && sudo systemctl reload nginx
#
# Build output (this project uses the browser builder — no /browser subfolder):
#   npm run build:prod
#   sudo rsync -av --delete dist/Masajid-Work/ /var/www/masajid/dist/Masajid-Work/

server {
    listen 80;
    listen [::]:80;
    server_name masajidwork.org www.masajidwork.org;

    root /var/www/masajid/dist/Masajid-Work;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # ERP backend — uncomment and set upstream when API is on the same host
    # location /SystemAPIs/ {
    #     proxy_pass http://127.0.0.1:5000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Generic REST API — keep before the Angular fallback if used
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|otf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
